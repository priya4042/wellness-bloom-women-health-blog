<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact Wellness Bloom</title>
  <meta name="description" content="Contact Wellness Bloom for editorial requests, partnerships, and health content inquiries.">
  <meta property="og:title" content="Contact Wellness Bloom">
  <meta property="og:description" content="Reach our editorial team.">
  <link rel="canonical" href="https://example.com/contact/">
  <link rel="stylesheet" href="../assets/css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
</head>
<body data-depth="1">
  <div id="site-header"></div>
  <main class="section">
    <div class="container article-shell">
      <h1>Contact Us</h1>
      <p>For collaborations, feedback, corrections, or content requests, use the form below.</p>
      <form id="contact-form" class="form-grid">
        <label>
          Name
          <input class="input" type="text" name="name" required>
        </label>
        <label>
          Email
          <input class="input" type="email" name="email" required>
        </label>
        <label>
          Topic
          <input class="input" type="text" name="topic" required>
        </label>
        <label>
          Message
          <textarea class="textarea" name="details" rows="5" required></textarea>
        </label>
        <button class="btn btn-primary" type="submit">Send Message</button>
      </form>
      <p id="contact-message" class="notice" style="margin-top:1rem;">We usually respond within 2 business days.</p>
      <div class="ad-slot" style="margin-top:1rem;">AdSense Contact Page Placeholder</div>
    </div>
  </main>
  <div id="site-footer"></div>
  <script src="../assets/js/site.js"></script>
  <script src="../assets/js/contact.js"></script>
</body>
</html>
